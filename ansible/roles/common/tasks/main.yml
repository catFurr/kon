---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - curl
      - unzip
      - rsync
      - ufw
      - apache2-utils
    state: present

- name: Allow SSH through firewall
  ufw:
    rule: allow
    port: "22"

- name: Allow HTTP through firewall
  ufw:
    rule: allow
    port: "80"

- name: Allow HTTPS through firewall
  ufw:
    rule: allow
    port: "443"

- name: Enable firewall
  ufw:
    state: enabled
    policy: deny

- name: Create deploy directory structure
  file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop:
    - "{{ deploy_root }}"
    - "{{ deploy_root }}/production"
    - "{{ deploy_root }}/previews"

# ── System security hardening ──────────────────────────────────────────────

- name: Hide processes from other users (hidepid)
  mount:
    path: /proc
    src: proc
    fstype: proc
    opts: hidepid=2,gid=0
    state: mounted

- name: Set default home directory permissions to 700
  lineinfile:
    path: /etc/login.defs
    regexp: "^UMASK"
    line: "UMASK 077"

- name: Set default adduser DIR_MODE to 700
  lineinfile:
    path: /etc/adduser.conf
    regexp: "^DIR_MODE="
    line: "DIR_MODE=0700"
