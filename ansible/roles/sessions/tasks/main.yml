---
# ── Install dependencies ───────────────────────────────────────────────────

- name: Install base packages for sessions
  apt:
    name:
      - tmux
      - git
      - curl
      - unzip
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Docker
  shell: |
    if ! command -v docker &>/dev/null; then
      curl -fsSL https://get.docker.com | sh
    fi
  args:
    creates: /usr/bin/docker

- name: Ensure Docker is running
  service:
    name: docker
    state: started
    enabled: true

- name: Install Node.js via NodeSource
  shell: |
    if ! command -v node &>/dev/null; then
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs
    fi
  args:
    creates: /usr/bin/node

- name: Install GitHub CLI
  shell: |
    if ! command -v gh &>/dev/null; then
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
        | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
      chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
        | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
      apt-get update
      apt-get install -y gh
    fi
  args:
    creates: /usr/bin/gh

- name: Install Claude Code
  shell: |
    if ! command -v claude &>/dev/null; then
      npm install -g @anthropic-ai/claude-code
    fi
  args:
    creates: /usr/local/bin/claude
  when: anthropic_api_key is defined and anthropic_api_key | length > 0

- name: Install OpenAI Codex
  shell: |
    if ! command -v codex &>/dev/null; then
      npm install -g @openai/codex
    fi
  args:
    creates: /usr/local/bin/codex
  when: openai_api_key is defined and openai_api_key | length > 0

# ── Set up kon directory structure ─────────────────────────────────────────

- name: Create kon directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/kon
    - /opt/kon/repos
    - /opt/kon/sessions
    - /opt/kon/.config/gh

# ── Copy orchestrator ──────────────────────────────────────────────────────

- name: Copy kon orchestrator directory
  copy:
    src: "{{ playbook_dir }}/../../orchestrator/"
    dest: /opt/kon/orchestrator/
    mode: "0755"
    directory_mode: "0755"

- name: Create kon symlink
  file:
    src: /opt/kon/orchestrator/kon.mjs
    dest: /usr/local/bin/kon
    state: link
    force: true

- name: Create nginx sessions directory
  file:
    path: /etc/nginx/sessions
    state: directory
    mode: "0755"

- name: Include session nginx configs
  lineinfile:
    path: /etc/nginx/nginx.conf
    line: "    include /etc/nginx/sessions/*.conf;"
    insertbefore: "^\\}"
    state: present
  notify: reload nginx

# ── Write config ───────────────────────────────────────────────────────────

- name: Write kon config
  template:
    src: config.json.j2
    dest: /opt/kon/config.json
    mode: "0644"

# ── Authenticate GitHub CLI ────────────────────────────────────────────────

- name: Write gh CLI hosts config
  copy:
    dest: /opt/kon/.config/gh/hosts.yml
    content: |
      github.com:
        oauth_token: {{ github_token }}
        user: {{ github_user }}
        git_protocol: https
    mode: "0600"
  when: github_token is defined

# ── AI tool API keys ──────────────────────────────────────────────────────

- name: Create kon group for shared secrets
  group:
    name: kon-sessions
    state: present

- name: Write shared env file for sessions
  copy:
    dest: /opt/kon/env
    content: |
      {% if anthropic_api_key is defined and anthropic_api_key | length > 0 %}
      ANTHROPIC_API_KEY={{ anthropic_api_key }}
      {% endif %}
      {% if openai_api_key is defined and openai_api_key | length > 0 %}
      OPENAI_API_KEY={{ openai_api_key }}
      {% endif %}
    mode: "0640"
    owner: root
    group: kon-sessions
  when: (anthropic_api_key is defined and anthropic_api_key | length > 0) or (openai_api_key is defined and openai_api_key | length > 0)

- name: Write vault password file
  copy:
    dest: /opt/kon/.vault-pass
    content: "{{ vault_password }}"
    mode: "0640"
    owner: root
    group: kon-sessions
  when: vault_password is defined and vault_password | length > 0

- name: Restrict gh config to kon-sessions group
  file:
    path: /opt/kon/.config/gh/hosts.yml
    mode: "0640"
    group: kon-sessions
  when: github_token is defined

# ── Set up systemd timer for repo sync ─────────────────────────────────────

- name: Install kon-sync service
  template:
    src: kon-sync.service.j2
    dest: /etc/systemd/system/kon-sync.service
    mode: "0644"
  notify: reload systemd

- name: Install kon-sync timer
  template:
    src: kon-sync.timer.j2
    dest: /etc/systemd/system/kon-sync.timer
    mode: "0644"
  notify: reload systemd

- name: Enable and start kon-sync timer
  systemd:
    name: kon-sync.timer
    enabled: true
    state: started
    daemon_reload: true

# ── Initial repo sync ─────────────────────────────────────────────────────

- name: Run initial repo sync
  command: /usr/local/bin/kon sync
  register: sync_result
  changed_when: "'Cloning' in sync_result.stdout"

# ── Create kon admin user ──────────────────────────────────────────────────

- name: Create kon admin user
  user:
    name: kon
    shell: /bin/bash
    groups: sudo
    create_home: true
    state: present

- name: Allow kon user passwordless sudo for session management
  copy:
    dest: /etc/sudoers.d/kon
    content: |
      kon ALL=(ALL) NOPASSWD: /usr/local/bin/kon
    mode: "0440"
    validate: "visudo -cf %s"

# ── Shell alias for convenience ────────────────────────────────────────────

- name: Add kon alias for admin user
  lineinfile:
    path: /home/kon/.bashrc
    line: 'alias kon="sudo /usr/local/bin/kon"'
    create: true
    owner: kon
    group: kon
