---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Create htpasswd for preview auth
  command: htpasswd -cb /etc/nginx/.htpasswd {{ preview_htpasswd.user }} {{ preview_htpasswd.pass }}
  args:
    creates: /etc/nginx/.htpasswd
  when: preview_htpasswd is defined and preview_htpasswd
  notify: reload nginx

- name: Deploy site nginx config
  template:
    src: site.conf.j2
    dest: /etc/nginx/sites-available/{{ domain }}.conf
  notify: reload nginx

- name: Enable site nginx config
  file:
    src: /etc/nginx/sites-available/{{ domain }}.conf
    dest: /etc/nginx/sites-enabled/{{ domain }}.conf
    state: link
  notify: reload nginx

- name: Ensure nginx is running
  service:
    name: nginx
    state: started
    enabled: true
