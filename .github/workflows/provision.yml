name: Provision

on:
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read VPS host from stack.json
        id: config
        run: echo "vps_host=$(jq -r '.vps_host' stack.json)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ steps.config.outputs.vps_host }} >> ~/.ssh/known_hosts

      - name: Write Ansible inventory
        run: |
          cat > ansible/inventory/hosts.yml << EOF
          all:
            hosts:
              vps:
                ansible_host: ${{ steps.config.outputs.vps_host }}
                ansible_user: root
                ansible_ssh_private_key_file: ~/.ssh/deploy_key
          EOF

      - name: Install Ansible
        run: pip install ansible

      - name: Run provision playbook
        working-directory: ansible
        run: |
          ansible-playbook playbooks/provision.yml \
            -e "@../stack.json" \
            -e "cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -e "github_token=${{ secrets.KON_GITHUB_TOKEN }}" \
            -e "anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}" \
            -e "openai_api_key=${{ secrets.OPENAI_API_KEY }}"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
